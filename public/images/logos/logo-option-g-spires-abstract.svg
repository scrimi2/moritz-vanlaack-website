<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gradG1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gradG2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="gradG3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Three overlapping triangular spires — abstract cathedral meets M letterform -->

  <!-- Back spire (tallest, left) — faded -->
  <polygon points="65,185 25,185 45,18" fill="url(#gradG3)"/>

  <!-- Back spire (tallest, right) — faded -->
  <polygon points="175,185 135,185 155,18" fill="url(#gradG3)"/>

  <!-- Mid spire left -->
  <polygon points="85,185 35,185 60,30" fill="url(#gradG2)"/>

  <!-- Mid spire right -->
  <polygon points="165,185 115,185 140,30" fill="url(#gradG2)"/>

  <!-- Front center element — the M valley/bridge -->
  <path d="M 60 60 L 100 140 L 140 60"
        fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dot accents at spire tips -->
  <circle cx="60" cy="30" r="3" fill="#7c3aed"/>
  <circle cx="140" cy="30" r="3" fill="#7c3aed"/>
</svg>