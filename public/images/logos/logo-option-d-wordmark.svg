<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="gradD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- Main wordmark text -->
  <text x="300" y="62" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="38" font-weight="900" fill="#171717"
        letter-spacing="12" text-transform="uppercase">
    MORITZ
  </text>

  <!-- "van Laack" in lighter weight below -->
  <text x="300" y="98" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="28" font-weight="300" fill="#171717"
        letter-spacing="18">
    VAN LAACK
  </text>

  <!-- Accent line through/under "VAN" — distinctive element -->
  <line x1="100" y1="72" x2="500" y2="72" stroke="url(#gradD)" stroke-width="2.5"/>

  <!-- Small purple square accent left of name -->
  <rect x="68" y="44" width="10" height="10" fill="#7c3aed"/>

  <!-- Small purple square accent right of name -->
  <rect x="522" y="44" width="10" height="10" fill="#7c3aed"/>
</svg>