<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="240" height="200">
  <defs>
    <linearGradient id="gradI1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="gradI2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="gradI3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- LEFT SPIRE CLUSTER (first leg of M) -->
  <!-- Back triangle - lightest -->
  <polygon points="30,190 80,190 55,15" fill="url(#gradI3)"/>
  <!-- Mid triangle - offset right -->
  <polygon points="45,190 95,190 70,25" fill="url(#gradI1)"/>
  <!-- Front triangle - darkest -->
  <polygon points="55,190 105,190 80,20" fill="url(#gradI2)"/>

  <!-- RIGHT SPIRE CLUSTER (second leg of M) -->
  <!-- Back triangle - lightest -->
  <polygon points="135,190 185,190 160,15" fill="url(#gradI3)"/>
  <!-- Mid triangle - offset right -->
  <polygon points="150,190 200,190 175,25" fill="url(#gradI1)"/>
  <!-- Front triangle - darkest -->
  <polygon points="140,190 190,190 165,20" fill="url(#gradI2)"/>

  <!-- CENTER OVERLAP ZONE — where the two clusters meet, forming the M valley -->
  <polygon points="90,190 140,190 115,80" fill="url(#gradI1)" opacity="0.5"/>
</svg>