<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200" width="220" height="200">
  <defs>
    <linearGradient id="gradK1" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="gradK2" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gradK3" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="gradK4" x1="50%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.65"/>
    </linearGradient>
  </defs>

  <!-- LEFT SPIRE — wide spread of overlapping triangles -->
  <polygon points="5,190 50,190 28,14" fill="url(#gradK3)"/>
  <polygon points="20,190 65,190 42,20" fill="url(#gradK1)"/>
  <polygon points="35,190 80,190 58,10" fill="url(#gradK2)"/>
  <polygon points="48,190 93,190 70,18" fill="url(#gradK4)"/>

  <!-- RIGHT SPIRE — wide spread, mirrored -->
  <polygon points="127,190 172,190 150,18" fill="url(#gradK4)"/>
  <polygon points="140,190 185,190 162,10" fill="url(#gradK2)"/>
  <polygon points="155,190 200,190 178,20" fill="url(#gradK1)"/>
  <polygon points="170,190 215,190 192,14" fill="url(#gradK3)"/>

  <!-- Overlap zone creates a rich purple blend in the center -->
</svg>