<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gradE" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- The "M" formed by two cathedral spires meeting at a central valley -->
  <!-- Left spire -->
  <path d="M 30 170 L 30 70 L 55 20 L 80 70 L 80 170"
        fill="none" stroke="url(#gradE)" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Right spire -->
  <path d="M 120 170 L 120 70 L 145 20 L 170 70 L 170 170"
        fill="none" stroke="url(#gradE)" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Central connecting valley (the M's center dip) -->
  <path d="M 80 70 L 100 120 L 120 70"
        fill="none" stroke="url(#gradE)" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Subtle cross on left spire tip -->
  <line x1="55" y1="12" x2="55" y2="24" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="49" y1="16" x2="61" y2="16" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Subtle cross on right spire tip -->
  <line x1="145" y1="12" x2="145" y2="24" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="139" y1="16" x2="151" y2="16" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
</svg>